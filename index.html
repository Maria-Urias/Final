<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spice and Cariño Microbakery</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(to bottom, #f6cfd8 0%, #f4c8d2 45%, #f8ddd7 100%);
      color: #ffffff;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .welcome {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .title {
      margin: 10px 0 0;
      font-size: clamp(2.6rem, 6vw, 5.5rem);
      line-height: 1.05;
      font-weight: normal;
      text-transform: uppercase;
    }

    .section {
      max-width: 1250px;
      margin: 0 auto;
      padding: 10px 24px 50px;
    }

    .intro-row,
    .lower-row {
      display: grid;
      gap: 28px;
      align-items: center;
    }

    .intro-row {
      grid-template-columns: 1.1fr 1fr 1.2fr;
    }

    .lower-row {
      grid-template-columns: 1fr 1fr 1fr;
      margin-top: 35px;
      align-items: start;
    }

    .card {
      text-align: center;
    }

    .image-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card img {
      width: 100%;
      max-width: 340px;
      height: 340px;
      object-fit: cover;
      display: block;
      margin: 0 auto;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card img:hover {
      transform: scale(1.03);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
    }

    .cupcake img {
      height: 420px;
      object-fit: contain;
      box-shadow: none;
      background: transparent;
    }

    .tilt-left img {
      transform: rotate(-8deg);
    }

    .tilt-right img {
      transform: rotate(8deg);
    }

    .tilt-left img:hover {
      transform: rotate(-8deg) scale(1.03);
    }

    .tilt-right img:hover {
      transform: rotate(8deg) scale(1.03);
    }

    .script-text {
      margin: 24px 0 0;
      font-family: "Brush Script MT", cursive;
      font-size: 2.1rem;
      color: #2f1a1a;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff8f5;
      font-family: Arial, sans-serif;
    }

    @media (max-width: 900px) {
      .intro-row,
      .lower-row {
        grid-template-columns: 1fr;
      }

      .script-text {
        text-align: center;
      }

      .card img,
      .cupcake img {
        max-width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <p class="welcome">Welcome To</p>
    <h1 class="title">Spice and Cariño<br>Microbakery</h1>
  </header>

  <main class="section">
    <section class="intro-row">
      <a class="image-link card cupcake" href="cupcake.html">
        <img src="390666b6-2aec-4df3-be26-f922c262029c.jpeg" alt="Pink frosted cupcake">
      </a>

      <a class="image-link card" href="stuffed-bollio.html">
        <img src="6a68aa97-a571-421a-8339-04287819ab40.jpeg" alt="Fresh bread rolls on a tray">
      </a>

      <a class="image-link card" href="coffee-cake.html">
        <img src="3f903f31-1cdb-4c2f-96c8-464008f785c8.jpeg" alt="Coffee cake sliced in half">
      </a>
    </section>

    <p class="script-text">Click on an image to open its page</p>

    <section class="lower-row">
      <a class="image-link card" href="artisan-bread.html">
        <img src="89279a0b-c14f-4b55-a53d-060320f1b53c.jpeg" alt="Round artisan bread on a cooling rack">
      </a>

      <a class="image-link card tilt-left" href="loaf-bread.html">
        <img src="390666b6-2aec-4df3-be26-f922c262029c.jpeg" alt="Golden loaf bread on a baking tray">
      </a>

      <a class="image-link card tilt-right" href="focaccia.html">
        <img src="89279a0b-c14f-4b55-a53d-060320f1b53c.jpeg" alt="Sliced focaccia bread">
      </a>
    </section>

    <p class="script-text">Each photo links to a different page</p>
  </main>

  <footer>
    <p>&copy; 2026 Spice and Cariño Microbakery</p>
  </footer>
</body>
</html>
