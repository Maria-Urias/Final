<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #b38b6d;
      color: #fff8f0;
    }

    header {
      background-color: rgba(0, 0, 0, 0.15);

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 40px 20px;
    }

    .content h1 {

      margin-bottom: 10px;

    .button-link {
      text-decoration: none;
    }

      background-color: #fff8f0;

      font-size: 1rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s ease;

    .button-link button:hover {
